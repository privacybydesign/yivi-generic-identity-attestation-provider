name: Status checks

on:
  pull_request:
    branches: [ main ]
  # Make it possible to trigger the checks manually.
  workflow_dispatch:

jobs:
  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: giap.client
        run: npm install

      - name: Build frontend
        working-directory: giap.client
        run: npm run build
  
  build-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Use .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Install dependencies
        working-directory: GIAP.Server
        run: dotnet restore

      - name: Build backend
        working-directory: GIAP.Server
        run: dotnet build

  test-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Use .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Install dependencies and test project
        working-directory: GIAP.Tests
        run: dotnet test